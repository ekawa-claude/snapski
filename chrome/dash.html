<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapSki — store dashboard</title>
    <style>
      * { margin: 0; box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(120% 120% at 50% 0%, #1b1530 0%, #0b0b0e 60%);
        font-family: Inter, "Segoe UI", sans-serif;
      }
      /* Exactly a 1280x800 store tile — screenshot this box (or the window). */
      .tile {
        width: 1280px;
        height: 800px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .shot {
        width: 1140px;
        border-radius: 16px;
        box-shadow: 0 30px 80px -20px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.06);
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <img class="shot" src="/dash.png" alt="SnapSki annotated dashboard" />
    </div>
  </body>
</html>
