appId: com.artur.snapski
productName: SnapSki
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - '**/node_modules/ffmpeg-static/**'
extraResources:
  - from: build/icon.png
    to: icon.png
  - from: build/tray.png
    to: tray.png
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  artifactName: ${productName}-${version}.${ext}
# Sleek one-click, per-user install (no UAC, no dir prompt) — Discord-style.
# Auto-launches on finish; auto-update replaces it in place afterwards.
nsis:
  oneClick: true
  perMachine: false
  allowElevation: false
  runAfterFinish: true
  deleteAppDataOnUninstall: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SnapSki
  artifactName: ${productName}-Setup-${version}.${ext}
# Auto-update feed (electron-updater reads this at build → app-update.yml).
publish:
  provider: generic
  url: https://chat.wishly.wtf/snapski/
